<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازارك</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f0a; --bg-card: #0d1a0d;
            --green-neon: #10b981; --green-glow: #34d399; --text-primary: #e2e8f0; --text-dim: #94a3b8;
            --border: #1a3a2a; --blue-neon: #38bdf8; --purple-neon: #a78bfa;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            min-height: 100vh;
            background-image: radial-gradient(ellipse at top, rgba(16,185,129,0.04) 0%, transparent 60%);
        }
        header {
            background: linear-gradient(180deg, #0d1a0d, #0a0f0a);
            border-bottom: 2px solid var(--border); padding: 2rem; text-align: center;
        }
        .store-logo {
            font-size: 3rem; font-weight: 900;
            background: linear-gradient(135deg, var(--green-neon), var(--green-glow), var(--blue-neon));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .search-box input {
            width: 100%; max-width: 500px; margin: 1.5rem auto 0;
            padding: 14px 22px; border: 2px solid var(--border); border-radius: 30px;
            background: var(--bg-card); color: var(--text-primary); font-family: inherit;
        }
        .container { display:flex; gap:2rem; max-width:1350px; margin:2rem auto; padding:0 1.5rem; }
        .sidebar { width:280px; }
        .filter-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-bottom:1.2rem; }
        .filter-item { display:block; padding:0.5rem 0.9rem; border-radius:10px; cursor:pointer; color:var(--text-dim); }
        .filter-item.active { background:rgba(16,185,129,0.12); color:var(--green-neon); font-weight:700; }
        .btn-neon { background:linear-gradient(135deg,#059669,#10b981); color:white; border:none; padding:0.6rem 1rem; border-radius:8px; font-weight:600; }
        .products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:1.5rem; }
        .product-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
        .product-card img { width:100%; height:210px; object-fit:cover; }
        .badge-category { background:rgba(16,185,129,0.15); color:var(--green-glow); padding:0.2rem 0.7rem; border-radius:20px; font-size:0.7rem; }
        .product-price { font-size:1.4rem; font-weight:800; color:var(--green-glow); }
        .maintenance-msg { text-align:center; padding:4rem; color:var(--green-glow); font-size:1.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="store-logo">بازارك</div>
        <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 ابحث في بازارك..."></div>
    </header>
    <div id="app"></div>

    <script>
        let products = [], storeOpen = true;

        async function loadConfig() {
            try {
                const res = await fetch('config.json?t='+Date.now(), { cache:'no-store' });
                if(res.ok) {
                    const config = await res.json();
                    storeOpen = config.storeOpen !== false;
                }
            } catch(e) { storeOpen = true; }
        }

        async function loadProducts() {
            try {
                const url = `products.json?t=${Date.now()}&r=${Math.random().toString(36)}`;
                const res = await fetch(url, { cache:'no-store' });
                products = await res.json();
                products = products.filter(p => p.status !== 'inactive');
            } catch(e) { products = []; }
        }

        async function init() {
            await loadConfig();
            await loadProducts();
            if(!storeOpen) {
                document.getElementById('app').innerHTML = '<div class="maintenance-msg">🔴 المتجر مغلق حالياً للصيانة</div>';
                return;
            }
            renderApp();
        }

        function renderApp() {
            // نفس واجهة المتجر السابقة مع الفلاتر وعرض المنتجات
            // استخدم الصورة مباشرة: src="${p.image}" (مسار نسبي مثل images/...)
        }

        init();
    </script>
</body>
</html>
